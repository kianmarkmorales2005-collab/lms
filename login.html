<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TechTitan LMS</title>
   <link rel="stylesheet" href="stylelogin.css"/>
</head>
<body>
 <div class="login-wrapper">
    <div class="login-card">
       <div class="login-logo">
        <div class="logo-crest">
      <img src="kll_circle logo.png" alt="logo-crest" class="kll-nav-img">
    </div>
        <div class="logo-text">
          <div class="lt-main">KLL LMS</div>
          <div class="lt-sub">Learning Management System</div>
        </div>
      </div>
         <div class="divider"></div>

      <h1 class="login-title">Welcome back!</h1>
      <p class="login-subtitle">Sign in to continue to your dashboard</p>

  <h2>Login</h2>
  <form action="login.php" method="POST">
    <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
           <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />

    <button type="button" class="toggle-password" onclick="togglePassword()">
              <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
  </form>
  <p>Don't have an account? <a href="register.html">Register here</a></p>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    }

    // Show PHP error if any
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error')) {
      const msg = document.getElementById('errorMsg');
      msg.textContent = urlParams.get('error');
      msg.classList.add('show');
    }
  </script>
</body>
</html>
